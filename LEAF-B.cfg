hostname LEAF-B


nv overlay evpn
feature bgp
feature fabric forwarding
feature interface-vlan
feature vn-segment-vlan-based
feature nv overlay

ip domain-lookup

hardware access-list tcam region racl 512
hardware access-list tcam region arp-ether 256 double-wide


fabric forwarding anycast-gateway-mac 0001.0001.0001
vlan 1,10,20,50
vlan 10
  vn-segment 10010
vlan 20
  vn-segment 10020
vlan 50
  vn-segment 50000

vrf context PROD
  vni 50000
  rd 2:50000
  address-family ipv4 unicast
    route-target import 50000:50000
    route-target import 50000:50000 evpn
    route-target export 50000:50000
    route-target export 50000:50000 evpn
vrf context management

interface Vlan1

interface Vlan10
  no shutdown
  vrf member PROD
  ip address 172.16.10.1/24
  fabric forwarding mode anycast-gateway

interface Vlan20
  no shutdown
  vrf member PROD
  ip address 172.16.20.1/24
  fabric forwarding mode anycast-gateway

interface Vlan50
  no shutdown
  vrf member PROD
  ip forward

interface nve1
  no shutdown
  host-reachability protocol bgp
  source-interface loopback0
  member vni 10010
    ingress-replication protocol bgp
  member vni 10020
    ingress-replication protocol bgp
  member vni 50000 associate-vrf

interface Ethernet1/1
  no switchport
  ip address 24.1.1.1/30
  no shutdown

interface Ethernet1/2
  switchport access vlan 10

interface Ethernet1/3
  no switchport
  ip address 23.1.1.1/30
  no shutdown

interface Ethernet1/4
  switchport access vlan 20

interface Ethernet1/5


interface mgmt0
  vrf member management

interface loopback0
  ip address 2.2.2.2/32
icam monitor scale

line console
line vty
boot nxos bootflash:/nxos64-cs.10.5.3.F.bin 
router bgp 65002
  router-id 2.2.2.2
  address-family ipv4 unicast
    network 2.2.2.2/32
    maximum-paths 2
  neighbor 1.1.1.1
    remote-as 65001
    update-source loopback0
    ebgp-multihop 3
    address-family l2vpn evpn
      send-community
      send-community extended
  neighbor 23.1.1.2
    remote-as 65000
    address-family ipv4 unicast
  neighbor 24.1.1.2
    remote-as 65000
    address-family ipv4 unicast
  vrf PROD
    address-family ipv4 unicast
      network 172.16.10.0/24
      network 172.16.20.0/24
evpn
  vni 10010 l2
    rd auto
    route-target import 10010:10010
    route-target export 10010:10010
  vni 10020 l2
    rd auto
    route-target import 10020:10020
    route-target export 10020:10020